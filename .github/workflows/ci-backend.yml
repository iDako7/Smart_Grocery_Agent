name: CI — Backend

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/ci-backend.yml"
      - "src/backend/**"
      - "src/ai/**"
      - "contracts/**"
      - "tests/**"
      - "pytest.ini"
      - "ruff.toml"
  pull_request:
    branches: [main]

concurrency:
  group: backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - '.github/workflows/ci-backend.yml'
              - 'src/backend/**'
              - 'src/ai/**'
              - 'contracts/**'
              - 'tests/**'
              - 'pytest.ini'
              - 'ruff.toml'

  lint:
    name: Ruff lint & format
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - name: Lint
        run: uvx ruff@0.11.6 check src/backend/ src/ai/ contracts/ tests/

      - name: Format check
        run: uvx ruff@0.11.6 format --check src/backend/ src/ai/ contracts/ tests/

  test:
    name: Pytest
    runs-on: ubuntu-latest
    needs: [changes, lint]
    if: needs.changes.outputs.backend == 'true'
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: sga
          POSTGRES_USER: sga
          POSTGRES_PASSWORD: sga_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sga"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    env:
      DATABASE_URL: "postgresql+asyncpg://sga:sga_dev@localhost:5432/sga"
      TEST_DATABASE_URL: "postgresql+asyncpg://sga:sga_dev@localhost:5432/sga"
      PYTHONPATH: "."
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        working-directory: src/backend
        run: uv sync --frozen

      - name: Run Alembic migrations
        run: uv run --project src/backend alembic -c src/backend/alembic.ini upgrade head

      - name: Run tests
        run: uv run --project src/backend pytest

  docker:
    name: Docker build check
    runs-on: ubuntu-latest
    needs: [changes, test]
    if: needs.changes.outputs.backend == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -f src/backend/Dockerfile.dev .
