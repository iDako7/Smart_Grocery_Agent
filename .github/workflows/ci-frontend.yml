name: CI — Frontend

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/ci-frontend.yml"
      - "src/frontend/**"
      - "contracts/**"
  pull_request:
    branches: [main]

concurrency:
  group: frontend-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: src/frontend

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - '.github/workflows/ci-frontend.yml'
              - 'src/frontend/**'
              - 'contracts/**'
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}

  lint-typecheck:
    name: Lint & typecheck
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.x"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bunx tsc -b

  test:
    name: Test with coverage
    runs-on: ubuntu-latest
    needs: [changes, lint-typecheck]
    if: needs.changes.outputs.frontend == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.x"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests with coverage
        run: bun run test:coverage

  build:
    name: Production build
    runs-on: ubuntu-latest
    needs: [changes, lint-typecheck]
    if: needs.changes.outputs.frontend == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.x"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Verify CSS bundle (regression guard for #146)
        run: ./scripts/verify-css-bundle.sh
