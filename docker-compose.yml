services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sga}
      POSTGRES_USER: ${POSTGRES_USER:-sga}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sga_dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sga}"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: src/backend/Dockerfile.dev
    volumes:
      - ./src/backend:/app
      - ./src/ai:/ai
      - ./contracts:/contracts
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
