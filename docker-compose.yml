services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sga}
      POSTGRES_USER: ${POSTGRES_USER:-sga}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sga_dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sga}"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: src/backend/Dockerfile.dev
    volumes:
      - ./src/backend:/app/src/backend
      - ./src/ai:/app/src/ai
      - ./contracts:/app/contracts
      - ./data:/app/data:ro
      - backend_venv:/app/.venv
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      # Override localhost URL from .env — inside the container, Postgres is reachable via the service name
      DATABASE_URL: postgresql+asyncpg://sga:sga_dev@db:5432/sga
      # Override localhost URL from .env — inside the container, Redis is reachable via the service name
      REDIS_URL: redis://redis:6379/0
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 2s
      timeout: 2s
      retries: 30
      start_period: 5s
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  backend_venv:
  redis_data:
