# Fly.io config for SGA V2 demo deploy (issue #133).
# Region yvr = Vancouver (closest to target users; see docs/00-specs/product-spec-v2.md).
# Single-image deploy: Dockerfile at repo root builds SPA + FastAPI backend and
# serves both from the same origin via SERVE_FRONTEND=true.

app = "sga-v2"
primary_region = "yvr"

[build]
  dockerfile = "Dockerfile"

[env]
  # Mount the built SPA at `/` and disable CORS middleware (same-origin deploy).
  SERVE_FRONTEND = "true"
  # Real magic-link auth via JWT. `fly secrets set JWT_SECRET=…` required.
  SGA_AUTH_MODE = "prod"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 400

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024

[checks.health]
  type = "http"
  port = 8000
  interval = "15s"
  timeout = "5s"
  grace_period = "30s"
  method = "GET"
  path = "/health"
