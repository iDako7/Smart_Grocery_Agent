# MED-02: User Story 2 — leftover planning with varied preparations
- description: 'MED-02: Leftover chicken wings — multiple preparations with varied methods'
  vars:
    input: 'I have 3/4 of a Costco chicken wing pack, rice, soy sauce, bok choy'
  assert:
    # Structural: calls analyze_pcsv
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        return parsed.tool_calls.some(tc => tc.name === 'analyze_pcsv');
      weight: 2
      metric: calls_analyze_pcsv

    # Structural: calls search_recipes
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        return parsed.tool_calls.some(tc => tc.name === 'search_recipes');
      weight: 2
      metric: calls_search_recipes

    # Content: suggests at least 2 different preparations
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        const text = parsed.response_text.toLowerCase();
        const methods = ['bake', 'baked', 'grill', 'grilled', 'fry', 'fried', 'stir-fry',
          'air fry', 'air-fry', 'braise', 'braised', 'roast', 'roasted', 'steam', 'steamed',
          'boil', 'boiled', 'crispy', 'sticky', 'honey', 'soy', 'garlic', 'teriyaki',
          'bbq', 'buffalo', 'korean', 'chinese', 'salt and pepper', 'kung pao', 'adobo'];
        const found = methods.filter(m => text.includes(m));
        const uniqueFound = [...new Set(found)];
        return uniqueFound.length >= 2;
      weight: 3
      metric: varied_preparations

    # Content: mentions chicken wings
    - type: icontains
      value: 'chicken wing'
      weight: 1
      metric: mentions_chicken_wings

    # LLM-judge (Claude via OpenRouter)
    - type: llm-rubric
      value: |
        The user has 3/4 of a Costco chicken wing pack, rice, soy sauce, and bok choy.
        Evaluate:
        1. Does the agent suggest at least 2 different preparations for the chicken wings?
        2. Do the suggestions use varied cooking methods or sauce profiles (not the same dish repeated)?
        3. Do the suggestions feel like distinct meals rather than minor variations?
      provider:
        id: openai:chat:anthropic/claude-opus-4-6
        config:
          apiBaseUrl: https://openrouter.ai/api/v1
          apiKey: '{{env.OPENROUTER_API_KEY}}'
          temperature: 0
      weight: 2
      metric: meal_variety_claude

    # LLM-judge (GPT via OpenRouter)
    - type: llm-rubric
      value: |
        The user has 3/4 of a Costco chicken wing pack, rice, soy sauce, and bok choy.
        Evaluate:
        1. Does the agent suggest at least 2 different preparations for the chicken wings?
        2. Do the suggestions use varied cooking methods or sauce profiles (not the same dish repeated)?
        3. Do the suggestions feel like distinct meals rather than minor variations?
      provider:
        id: openai:chat:openai/gpt-5.4
        config:
          apiBaseUrl: https://openrouter.ai/api/v1
          apiKey: '{{env.OPENROUTER_API_KEY}}'
          temperature: 0
      weight: 2
      metric: meal_variety_gpt
