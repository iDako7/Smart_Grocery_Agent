# HIGH-02: Vague input with partial ingredients
# Valid paths: (a) call analyze_pcsv with at least ["chicken", "rice"] then proceed,
#              OR (b) ask what else the user has before analyzing
- description: 'HIGH-02: Agent handles partial ingredients — identifies veggie gap or asks relevant follow-up'
  vars:
    input: 'maybe some chicken and rice, not sure what else'
  assert:
    # Structural: agent either calls analyze_pcsv with chicken+rice OR asks a question
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        const toolNames = parsed.tool_calls.map(tc => tc.name);
        const asksQuestion = parsed.response_text.includes('?');
        if (asksQuestion && toolNames.length === 0) return true;
        const pcsvCall = parsed.tool_calls.find(tc => tc.name === 'analyze_pcsv');
        if (!pcsvCall) return false;
        const ingredients = pcsvCall.input.ingredients || [];
        const lower = ingredients.map(i => i.toLowerCase());
        const hasChicken = lower.some(i => i.includes('chicken'));
        const hasRice = lower.some(i => i.includes('rice'));
        return hasChicken && hasRice;
      weight: 3
      metric: correct_ingredient_extraction

    # Content: if agent proceeds, it should identify veggie gap
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        const text = parsed.response_text.toLowerCase();
        const asksQuestion = parsed.response_text.includes('?') && parsed.tool_calls.length === 0;
        if (asksQuestion) return true;
        return text.includes('veggie') || text.includes('vegetable') || text.includes('greens') || text.includes('vegatable');
      weight: 2
      metric: veggie_gap_identified

    # Content: response is relevant (mentions chicken, rice, or asks about ingredients)
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        const text = parsed.response_text.toLowerCase();
        return text.includes('chicken') || text.includes('rice') || text.includes('ingredient');
      weight: 1
      metric: response_relevance

    # LLM-judge (Claude via OpenRouter)
    - type: llm-rubric
      value: |
        The user said: "maybe some chicken and rice, not sure what else".
        If the agent proceeded with suggestions, did it identify the veggie gap and suggest specific items to fill it?
        If the agent asked a follow-up question, was it relevant and not redundant?
        Either path is acceptable. The agent should not ignore the uncertainty.
      provider:
        id: openai:chat:anthropic/claude-opus-4-6
        config:
          apiBaseUrl: https://openrouter.ai/api/v1
          apiKey: '{{env.OPENROUTER_API_KEY}}'
          temperature: 0
      weight: 2
      metric: partial_input_handling_claude

    # LLM-judge (GPT via OpenRouter)
    - type: llm-rubric
      value: |
        The user said: "maybe some chicken and rice, not sure what else".
        If the agent proceeded with suggestions, did it identify the veggie gap and suggest specific items to fill it?
        If the agent asked a follow-up question, was it relevant and not redundant?
        Either path is acceptable. The agent should not ignore the uncertainty.
      provider:
        id: openai:chat:openai/gpt-5.4
        config:
          apiBaseUrl: https://openrouter.ai/api/v1
          apiKey: '{{env.OPENROUTER_API_KEY}}'
          temperature: 0
      weight: 2
      metric: partial_input_handling_gpt
