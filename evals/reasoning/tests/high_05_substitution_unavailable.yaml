# HIGH-05: Substitution — unavailable ingredient
# User can't find gochujang. Agent must call get_substitutions.
- description: 'HIGH-05: Agent calls get_substitutions for unavailable gochujang'
  vars:
    input: "I want to make Korean BBQ pork belly but I can't find gochujang anywhere"
  assert:
    # Structural: agent calls get_substitutions for gochujang
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        return parsed.tool_calls.some(tc =>
          tc.name === 'get_substitutions' &&
          tc.input.ingredient && tc.input.ingredient.toLowerCase().includes('gochujang')
        );
      weight: 3
      metric: calls_get_substitutions

    # Content: response provides at least one alternative
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        const text = parsed.response_text.toLowerCase();
        const hasAlternative = text.includes('substitute') || text.includes('alternative') ||
          text.includes('instead') || text.includes('replace') || text.includes('use');
        return hasAlternative;
      weight: 2
      metric: provides_alternative

    # Content: response explains how the substitute changes the dish
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        const text = parsed.response_text.toLowerCase();
        return text.includes('flavor') || text.includes('taste') || text.includes('spic') ||
          text.includes('heat') || text.includes('similar') || text.includes('differ');
      weight: 2
      metric: explains_impact

    # Content: mentions Korean BBQ context
    - type: icontains
      value: 'Korean'
      weight: 1
      metric: korean_context
