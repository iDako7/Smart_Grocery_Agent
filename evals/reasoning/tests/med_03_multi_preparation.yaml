# MED-03: Multi-preparation variety — chicken thighs for the whole week
- description: 'MED-03: Varied chicken thigh recipes for a week — 3+ recipes, different methods'
  vars:
    input: 'I bought a huge pack of chicken thighs from Costco. Give me ideas for the whole week.'
    household_size: '2'
  assert:
    # Structural: calls search_recipes
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        return parsed.tool_calls.some(tc => tc.name === 'search_recipes');
      weight: 2
      metric: calls_search_recipes

    # Content: at least 3 different recipes suggested
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        const text = parsed.response_text;
        // Count numbered items (1. 2. 3. or **1** **2** patterns) or recipe-like headers
        const numberedItems = text.match(/(?:^|\n)\s*(?:\d+[\.\):]|\*\*\d+)/gm);
        const recipeHeaders = text.match(/(?:^|\n)\s*(?:#{1,3}\s|\*\*[A-Z])/gm);
        const count = Math.max(
          numberedItems ? numberedItems.length : 0,
          recipeHeaders ? recipeHeaders.length : 0
        );
        if (count >= 3) return true;
        // Fallback: check tool calls for multiple recipe details
        const recipeDetails = parsed.tool_calls.filter(tc => tc.name === 'get_recipe_detail');
        return recipeDetails.length >= 3;
      weight: 3
      metric: three_plus_recipes

    # Content: varied cooking methods
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        const text = parsed.response_text.toLowerCase();
        const methods = ['bake', 'baked', 'grill', 'grilled', 'fry', 'fried', 'stir-fry',
          'air fry', 'braise', 'braised', 'roast', 'roasted', 'steam', 'steamed',
          'slow cook', 'curry', 'soup', 'stew', 'teriyaki', 'bbq', 'korean',
          'adobo', 'tikka', 'tandoori', 'karaage', 'schnitzel', 'cacciatore'];
        const found = [...new Set(methods.filter(m => text.includes(m)))];
        return found.length >= 3;
      weight: 2
      metric: varied_methods

    # Content: mentions chicken thighs
    - type: icontains
      value: 'chicken thigh'
      weight: 1
      metric: mentions_chicken_thighs

    # LLM-judge (Claude via OpenRouter)
    - type: llm-rubric
      value: |
        The user bought a huge pack of chicken thighs from Costco for a household of 2 and wants ideas for the whole week.
        Evaluate:
        1. Are at least 3 different recipes suggested?
        2. Do they use different cooking methods or cuisine styles (enough variety for a week)?
        3. Would the user NOT get bored eating these meals across a week?
      provider:
        id: openai:chat:anthropic/claude-opus-4-6
        config:
          apiBaseUrl: https://openrouter.ai/api/v1
          apiKey: '{{env.OPENROUTER_API_KEY}}'
          temperature: 0
      weight: 2
      metric: week_variety_claude

    # LLM-judge (GPT via OpenRouter)
    - type: llm-rubric
      value: |
        The user bought a huge pack of chicken thighs from Costco for a household of 2 and wants ideas for the whole week.
        Evaluate:
        1. Are at least 3 different recipes suggested?
        2. Do they use different cooking methods or cuisine styles (enough variety for a week)?
        3. Would the user NOT get bored eating these meals across a week?
      provider:
        id: openai:chat:openai/gpt-5.4
        config:
          apiBaseUrl: https://openrouter.ai/api/v1
          apiKey: '{{env.OPENROUTER_API_KEY}}'
          temperature: 0
      weight: 2
      metric: week_variety_gpt
