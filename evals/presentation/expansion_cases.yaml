# Presentation expansion eval cases for SGA V2
# 4 cases extending phase2 coverage:
#   E1, E2 (bilingual)    — Chinese-only and code-switched inputs
#   E3, E4 (adversarial)  — wall-of-text and prompt-injection robustness
#
# Runnable by evals/phase2/provider.py via a config that points `tests:` at
# this file. Assertion paths resolve relative to this file's location.

# ---------------------------------------------------------------------------
# Category bilingual — E1: Chinese-only input
# ---------------------------------------------------------------------------

- description: "E1: bilingual ZH input — chicken+broccoli dinner for 2"
  vars:
    input: "我有鸡肉和西兰花，请帮我准备两个人的晚餐。"
    screen: "home"
    category: "bilingual"
    expected_dish_min: 2
    expected_dish_max: 3
    party_size: 2
  assert:
    - type: javascript
      value: file://assertions/structural.js
      metric: agent_completes
    - type: javascript
      value: file://assertions/dish_count.js
      metric: dish_count
    - type: javascript
      value: file://assertions/ingredient_noise.js
      metric: ingredient_noise
    - type: llm-rubric
      value: |
        The user wrote in Chinese: "我有鸡肉和西兰花，请帮我准备两个人的晚餐。" (≈ "I have chicken and broccoli, please prepare dinner for 2"). Score 1-5 on:
        (1) Comprehension: did the agent correctly understand the Chinese input (chicken + broccoli, party of 2)?
        (2) Usefulness: are the recipes practical and executable with chicken and broccoli?
        Response language can be EN or ZH — do NOT penalize the agent for replying in either language.
        Return the overall score (minimum of the two).
        IMPORTANT: Set pass=true whenever the overall score is 2 or higher. Set pass=false only when the overall score is 1, the response is empty, or the agent clearly failed to parse the Chinese (e.g., asked "what ingredients?" or produced unrelated dishes).
      metric: bilingual_quality
      threshold: 2

# ---------------------------------------------------------------------------
# Category bilingual — E2: code-switched input
# ---------------------------------------------------------------------------

- description: "E2: bilingual code-switch — chicken+broccoli dinner for 2"
  vars:
    input: "I have 鸡胸肉 (chicken breast) and 西兰花 (broccoli). Dinner for 2 please."
    screen: "home"
    category: "bilingual"
    expected_dish_min: 2
    expected_dish_max: 3
    party_size: 2
  assert:
    - type: javascript
      value: file://assertions/structural.js
      metric: agent_completes
    - type: javascript
      value: file://assertions/dish_count.js
      metric: dish_count
    - type: javascript
      value: file://assertions/ingredient_noise.js
      metric: ingredient_noise
    - type: llm-rubric
      value: |
        The user code-switched: "I have 鸡胸肉 (chicken breast) and 西兰花 (broccoli). Dinner for 2 please." Score 1-5 on:
        (1) Code-switch handling: agent processes mixed EN/ZH gracefully — no confusion, no asking what the Chinese characters mean.
        (2) Practicality: recipes are executable with chicken breast and broccoli.
        (3) Parenthetical robustness: agent does NOT treat the parenthetical English as separate ingredients (e.g., does not list "chicken breast" AND "鸡胸肉" as two distinct items).
        Return the overall score (minimum of the three).
        IMPORTANT: Set pass=true whenever the overall score is 2 or higher. Set pass=false only when the overall score is 1, the response is empty, or the agent clearly failed (e.g., duplicated ingredients, unrelated dishes, or asked for clarification of obvious terms).
      metric: bilingual_quality
      threshold: 2

