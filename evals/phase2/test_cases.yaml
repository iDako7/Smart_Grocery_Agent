# ---------------------------------------------------------------------------
# Category C — Diverse inputs (3 cases)
# ---------------------------------------------------------------------------

- description: "C1: vegetarian no-dairy — tofu+mushrooms dinner for 2"
  vars:
    input: "I'm vegetarian with no dairy. I have tofu and mushrooms. Please help me prepare dinner for two people."
    screen: "home"
    category: "diverse_inputs"
    expected_dish_min: 2
    expected_dish_max: 3
    party_size: 2
  assert:
    - type: javascript
      value: file://assertions/structural.js
      metric: agent_completes
    - type: javascript
      value: file://assertions/dish_count.js
      metric: dish_count
    - type: javascript
      value: file://assertions/ingredient_noise.js
      metric: ingredient_noise
    - type: llm-rubric
      value: "Rate the overall quality of this meal suggestion for {{party_size}} people on a scale of 1-5. Consider: Are the dishes practical? Is the number of dishes reasonable? Are the recipes diverse enough? Score 1=terrible, 3=acceptable, 5=excellent."
      metric: overall_quality
    - type: llm-rubric
      value: "Does this response strictly comply with the stated dietary restrictions (vegetarian, no dairy)? Score 1-5 where 1=clear violation, 3=mostly compliant with minor concerns, 5=fully compliant with no violations."
      metric: dietary_compliance

- description: "C2: Chinese input — chicken+broccoli dinner for 2 (bilingual test)"
  vars:
    input: "我有鸡肉和西兰花，帮我准备两个人的晚餐"
    screen: "home"
    category: "diverse_inputs"
    expected_dish_min: 2
    expected_dish_max: 3
    party_size: 2
  assert:
    - type: javascript
      value: file://assertions/structural.js
      metric: agent_completes
    - type: javascript
      value: file://assertions/dish_count.js
      metric: dish_count
    - type: javascript
      value: file://assertions/ingredient_noise.js
      metric: ingredient_noise
    - type: llm-rubric
      value: "Rate the overall quality of this meal suggestion for {{party_size}} people on a scale of 1-5. Consider: Are the dishes practical? Is the number of dishes reasonable? Are the recipes diverse enough? Score 1=terrible, 3=acceptable, 5=excellent."
      metric: overall_quality

- description: "C3: vague input — no ingredients, no party size"
  vars:
    input: "I want to cook something"
    screen: "home"
    category: "diverse_inputs"
    party_size: 0
  assert:
    - type: javascript
      value: file://assertions/structural.js
      metric: agent_completes
    - type: llm-rubric
      value: "The user gave a vague input ('I want to cook something'). Does the agent handle this well — either by asking clarifying questions or by making reasonable assumptions and proceeding? Score 1-5."
      metric: vague_input_handling
