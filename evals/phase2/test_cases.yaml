# Phase 2 eval test cases for SGA V2
# 5 cases across 3 categories:
#   A (dish_count)        — is the number of dishes reasonable for party size?
#   C (diverse_inputs)    — dietary preference, vague prompt
#   D (dietary/multi-turn) — hard dietary constraint, recipe swap across turns

# ---------------------------------------------------------------------------
# Category A — Dish count (1 case)
# ---------------------------------------------------------------------------

- description: "A1: chicken+broccoli dinner for 2"
  vars:
    input: "I have chicken and broccoli. Please help me prepare dinner for two people."
    screen: "home"
    category: "dish_count"
    expected_dish_min: 2
    expected_dish_max: 3
    party_size: 2
  assert:
    - type: javascript
      value: file://assertions/structural.js
      metric: agent_completes
    - type: javascript
      value: file://assertions/dish_count.js
      metric: dish_count
    - type: javascript
      value: file://assertions/ingredient_noise.js
      metric: ingredient_noise
    - type: llm-rubric
      value: |
        Evaluate this meal suggestion for {{party_size}} people with ingredients {{input}}.
        Score 1-5 on three criteria, then give an overall score (the minimum of the three):
        (1) Practicality: are the dishes executable with the stated ingredients without requiring unusual tools or techniques?
        (2) Count fit: is the total number of recipes between {{expected_dish_min}} and {{expected_dish_max}}?
        (3) Variety: are the recipes meaningfully different (different protein treatment, cuisine, or technique — not two pan-fried chicken dishes)?
        Return the overall score.
        IMPORTANT: Set pass=true whenever the overall score is 2 or higher, even if any individual criterion is weak. Set pass=false only when the overall score is 1 or when the response is entirely unusable (empty, unrelated to the input, or violates a hard constraint).
      metric: overall_quality
      threshold: 2

# ---------------------------------------------------------------------------
# Category C — Diverse inputs (2 cases)
# ---------------------------------------------------------------------------

- description: "C1: vegetarian no-dairy — tofu+mushrooms dinner for 2"
  vars:
    input: "I'm vegetarian with no dairy. I have tofu and mushrooms. Please help me prepare dinner for two people."
    screen: "home"
    category: "diverse_inputs"
    expected_dish_min: 2
    expected_dish_max: 3
    party_size: 2
  assert:
    - type: javascript
      value: file://assertions/structural.js
      metric: agent_completes
    - type: javascript
      value: file://assertions/dish_count.js
      metric: dish_count
    - type: javascript
      value: file://assertions/ingredient_noise.js
      metric: ingredient_noise
    - type: llm-rubric
      value: |
        Evaluate this vegetarian (no-dairy) meal suggestion for {{party_size}} people with ingredients {{input}}.
        Score 1-5 on three criteria, then give an overall score (the minimum of the three):
        (1) Practicality: are the dishes executable with the stated vegetarian ingredients (tofu, mushrooms) without unusual tools or techniques?
        (2) Count fit: is the total number of recipes between {{expected_dish_min}} and {{expected_dish_max}}?
        (3) Variety: are the recipes meaningfully different (different technique or cuisine — not two near-identical stir-fries)?
        Return the overall score.
        IMPORTANT: Set pass=true whenever the overall score is 2 or higher, even if any individual criterion is weak. Set pass=false only when the overall score is 1 or when the response is entirely unusable (empty, unrelated to the input, or violates a hard constraint).
      metric: overall_quality
      threshold: 2
    - type: llm-rubric
      value: |
        The user said vegetarian AND no dairy. Score 1-5:
        5 = Zero violations (no meat/poultry/fish/seafood/gelatin; no milk/cream/butter/cheese/yogurt). At least one concrete recipe is present.
        3 = Mostly compliant but a borderline ingredient is ambiguous (e.g., "broth" without specifying vegetable broth).
        1 = Clear violation — any dairy or animal protein appears.
        Return the score.
      metric: dietary_compliance
      threshold: 4

- description: "C3: vague input — no ingredients, no party size"
  vars:
    input: "I want to cook something"
    screen: "home"
    category: "diverse_inputs"
    party_size: 0
  assert:
    - type: javascript
      value: file://assertions/structural.js
      metric: agent_completes
    - type: llm-rubric
      value: |
        The user gave a vague prompt. Score 1-5 on three criteria, return the minimum:
        (1) Acknowledgment: does the response recognize the input is underspecified?
        (2) Forward motion: does it EITHER ask 1-2 targeted clarifying questions OR make a small reasonable assumption and proceed (not both, not neither)?
        (3) Usefulness: if assumptions were made, is the output still usable? If clarifications were asked, are they the right ones (ingredients on hand, party size, dietary constraints)?
        Return the overall score.
        IMPORTANT: Set pass=true whenever the overall score is 3 or higher, even if any individual criterion is weak. Set pass=false only when the overall score is 2 or below or when the response completely ignores the vague input (e.g., invents a full meal plan with zero acknowledgement of missing info).
      metric: vague_input_handling
      threshold: 3

# ---------------------------------------------------------------------------
# Category D — Dietary enforcement + multi-turn (new, issue #115)
# ---------------------------------------------------------------------------

- description: "D1: halal constraint — chicken+rice+broccoli dinner"
  vars:
    input: "I have chicken breast, rice, and broccoli, and I need halal recipes. Please help me plan dinner for two people."
    screen: "home"
    category: "dietary_enforcement"
    expected_dish_min: 2
    expected_dish_max: 3
    party_size: 2
  assert:
    - type: javascript
      value: file://assertions/structural.js
      metric: agent_completes
    - type: javascript
      value: file://assertions/dish_count.js
      metric: dish_count
    - type: llm-rubric
      value: |
        The user requested halal recipes. Does this response strictly comply with halal dietary rules? It must NOT suggest pork, ham, bacon, lard, or any non-halal proteins (e.g., non-halal gelatin, alcohol as an ingredient). At least one concrete recipe must be clearly present in the response.
        Score 1-5 where:
        5 = Zero violations AND at least one concrete recipe is present.
        3 = Mostly compliant with minor concerns (e.g., a borderline ingredient like unspecified broth).
        1 = Clear violation (e.g., pork, alcohol, non-halal gelatin appears), or no concrete recipe present.
        Return the score.
      metric: dietary_compliance
      threshold: 4

- description: "D3: recipes swap with 2-turn history — vegetarian swap"
  vars:
    # NOTE: `turns` is a JSON-encoded string (not a YAML list) to prevent
    # promptfoo from expanding it into separate parametric test rows (which
    # would break the multi-turn semantics — same session_id across turns).
    # `provider.py` json-decodes this back to list[str].
    turns: '["Plan me 3 dinners with chicken, rice, and vegetables for four people.", "Swap the first recipe for something vegetarian."]'
    screen: "home"
    category: "recipes_swap"
    party_size: 4
  assert:
    - type: javascript
      value: file://assertions/structural.js
      metric: agent_completes
    - type: llm-rubric
      value: |
        Context: user asked for 3 dinners with chicken/rice/vegetables for 4, then asked to swap the first recipe for something vegetarian. Judge the FINAL response only.
        Score 1-5 on three criteria, return the minimum:
        (1) Swap executed: recipe 1 has been REPLACED (not added) and is clearly vegetarian (no meat/poultry/fish).
        (2) Count preserved: total recipes = 3 (not 4, not 2).
        (3) Continuity: recipes 2 and 3 are the same or consistent with the previous turn (the user only asked to change recipe 1).
        Return the overall score.
      metric: recipes_swap_quality
      threshold: 3
