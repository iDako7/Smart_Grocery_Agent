# Phase 2 eval test cases for SGA V2
# 9 cases across 3 categories:
#   A (dish_count)        — is the number of dishes reasonable for party size?
#   B (ingredient_noise)  — are recipes overloaded with unlisted ingredients?
#   C (diverse_inputs)    — dietary constraints, bilingual, vague prompts

# ---------------------------------------------------------------------------
# Category A — Dish count (4 cases)
# ---------------------------------------------------------------------------

- description: "A1: chicken+broccoli dinner for 2"
  vars:
    input: "I have chicken and broccoli. Please help me prepare dinner for two people."
    screen: "home"
    category: "dish_count"
    expected_dish_min: 2
    expected_dish_max: 3
    party_size: 2
  assert:
    - type: javascript
      value: file://assertions/structural.js
      metric: agent_completes
    - type: javascript
      value: file://assertions/dish_count.js
      metric: dish_count
    - type: javascript
      value: file://assertions/ingredient_noise.js
      metric: ingredient_noise
    - type: llm-rubric
      value: |
        Evaluate this meal suggestion for {{party_size}} people with ingredients {{input}}.
        Score 1-5 on three criteria, then give an overall score (the minimum of the three):
        (1) Practicality: are the dishes executable with the stated ingredients without requiring unusual tools or techniques?
        (2) Count fit: is the total number of recipes between {{expected_dish_min}} and {{expected_dish_max}}?
        (3) Variety: are the recipes meaningfully different (different protein treatment, cuisine, or technique — not two pan-fried chicken dishes)?
        Return the overall score.
      metric: overall_quality
      threshold: 3

