# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
#
# Test D — lookup-heavy agent workload for infra comparison.
# Reuses evals/phase2/provider.py (HTTP → deployed backend).
# LLM is held constant: openai/gpt-5.4-mini via OpenRouter on both Fly and AWS.
#
# Run (IMPORTANT env vars):
#   SGA_EVAL_RESET_PROFILE=0 SGA_EVAL_BASE_URL=https://sga-v2.fly.dev \
#     npx promptfoo eval --no-cache -c evals/infra_comparison/promptfooconfig.yaml \
#     --output evals/infra_comparison/data/test_d_fly_run1.json
#   SGA_EVAL_RESET_PROFILE=0 SGA_EVAL_BASE_URL=https://d33hdkvctxckhb.cloudfront.net \
#     npx promptfoo eval --no-cache -c evals/infra_comparison/promptfooconfig.yaml \
#     --output evals/infra_comparison/data/test_d_aws_run1.json
#
# --no-cache is required so we measure real end-to-end latency, not cached response.
# SGA_EVAL_RESET_PROFILE=0 is required because Fly runs SGA_AUTH_MODE=prod — the
# /internal/reset-dev-profile endpoint is not mounted in prod. Profile state does
# not affect latency measurement, so this is safe.

description: >-
  Test D — SGA V2 lookup-heavy workload (Fly.io vs AWS infra comparison).
  8 cases targeting translate_term, analyze_pcsv, get_substitutions, lookup_store_product.
  DB lookup latency should dominate. JS-only assertions — no LLM grader.

prompts:
  - "{{input}}"

providers:
  - id: python:../phase2/provider.py

# No defaultTest.options.provider block needed: this suite uses only JS assertions
# (latency bounds + tool-call count proxy via thinking-event count). No LLM grader.

tests: file://lookup_cases.yaml
